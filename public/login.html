<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in · Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #F8F2F9 0%, #F0E8F2 35%, #E8E0EC 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 360px;
    }
    .logo {
      font-family: Montserrat, sans-serif;
      font-weight: 700;
      font-size: 24px;
      color: #333;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 28px;
    }
    .error {
      background: #ffebee;
      color: #c62828;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      margin-bottom: 16px;
    }
    input:focus {
      outline: none;
      border-color: #A77BE8;
      box-shadow: 0 0 0 2px rgba(167, 123, 232, 0.2);
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #E5D9F2 0%, #D4C4E8 50%, #C8B4E6 100%);
      color: #5a4a6a;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { opacity: 0.95; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">PULSE</div>
    <div class="sub">Sign in to your account</div>

    <div id="errorBox" class="error" style="display: none;"></div>

    <form method="post" action="/api/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>

      <button type="submit">Log in</button>
    </form>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const box = document.getElementById('errorBox');
    if (error === 'missing') {
      box.textContent = 'Please enter username and password.';
      box.style.display = 'block';
    } else if (error === 'invalid') {
      box.textContent = 'Invalid username or password.';
      box.style.display = 'block';
    }
  </script>
</body>
</html>
