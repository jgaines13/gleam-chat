<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in · Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #F8F2F9 0%, #F0E8F2 35%, #E8E0EC 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 360px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .logo-row .gleam-logo {
      height: 24px;
      width: auto;
      flex-shrink: 0;
      display: block;
      color: #000;
    }
    .logo-row .gleam-logo svg {
      height: 100%;
      width: auto;
      display: block;
    }
    .logo-row .brand-font {
      font-family: Montserrat, sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #000;
    }
    .sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 28px;
    }
    .error {
      background: #ffebee;
      color: #c62828;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      margin-bottom: 16px;
    }
    input:focus {
      outline: none;
      border-color: #A77BE8;
      box-shadow: 0 0 0 2px rgba(167, 123, 232, 0.2);
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #E5D9F2 0%, #D4C4E8 50%, #C8B4E6 100%);
      color: #5a4a6a;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { opacity: 0.95; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <span class="gleam-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M23 12.006C16.4496 13.3248 12.6469 17.0997 11.5429 23.5C10.3899 17.0392 6.57493 13.2401 0 12.006C6.5872 10.7478 10.4021 6.93661 11.5307 0.5C12.6469 6.85192 16.4128 10.6752 23 12.006Z" fill="#E25353"/>
          <path d="M23 12.006C16.4496 13.3248 12.6469 17.0997 11.5429 23.5C10.3899 17.0392 6.57493 13.2401 0 12.006C6.5872 10.7478 10.4021 6.93661 11.5307 0.5C12.6469 6.85192 16.4128 10.6752 23 12.006Z" fill="url(#gleam_star_login)"/>
          <defs><linearGradient id="gleam_star_login" x1="11.5" y1="0.5" x2="11.5" y2="23.5" gradientUnits="userSpaceOnUse"><stop stop-color="#FFE074"/><stop offset="1" stop-color="#FFC93F"/></linearGradient></defs>
        </svg>
      </span>
      <span class="brand-font">Gleam CHAT</span>
    </div>
    <div class="sub">Sign in to your account</div>

    <div id="errorBox" class="error" style="display: none;"></div>

    <form method="post" action="/api/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>

      <button type="submit">Log in</button>
    </form>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const box = document.getElementById('errorBox');
    if (error === 'missing') {
      box.textContent = 'Please enter username and password.';
      box.style.display = 'block';
    } else if (error === 'invalid') {
      box.textContent = 'Invalid username or password.';
      box.style.display = 'block';
    }
  </script>
</body>
</html>
